// ── Gemini API helper ─────────────────────────────────
async function geminiSearch(prompt){
  if(!state.apiKey)throw new Error("NO_KEY");
  const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-8b:generateContent?key=${state.apiKey}`;
  const res=await fetch(url,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      contents:[{parts:[{text:prompt}]}],
      tools:[{googleSearch:{}}],
      generationConfig:{temperature:0.1}
    })
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error.message||"Gemini error");
  const text=(data.candidates||[]).flatMap(c=>(c.content?.parts||[]).map(p=>p.text||"")).join("");
  return text;
}

async function fetchNAV(fund){
  if(!state.apiKey){state.showKeyModal=true;render();return;}
  state.navCache[fund.id]={loading:true,error:null};render();
  try{
    const prompt=`ค้นหาราคา NAV ล่าสุดของกองทุนรวม RMF ไทยชื่อ "${fund.name}" (${fund.fullName}) จาก sec.or.th, thaimutualfund.com หรือเว็บไซต์บลจ. ตอบกลับเป็น JSON เท่านั้น ไม่มี markdown: {"nav":<ตัวเลข>,"date":"<DD/MM/YYYY>","change":<ตัวเลข>,"changePct":<ตัวเลข>,"source":"<แหล่ง>"} หากไม่พบตอบ: {"error":"ไม่พบข้อมูล"}`;
    const text=await geminiSearch(prompt);
    const match=text.match(/\{[\s\S]*?\}/);
    if(!match)throw new Error("parse error");
    const parsed=JSON.parse(match[0]);
    if(parsed.error)throw new Error(parsed.error);
    state.navCache[fund.id]={...parsed,loading:false,error:null};
  }catch(e){
    if(e.message==="NO_KEY"){state.showKeyModal=true;render();return;}
    state.navCache[fund.id]={loading:false,error:e.message||"โหลดไม่สำเร็จ"};
  }
  render();
}

function el(tag,attrs,...children){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  children.flat(Infinity).forEach(c=>c!=null&&e.appendChild(typeof c==="string"?document.createTextNode(c):c));
  return e;
}

// ── Pie chart (SVG) ───────────────────────────────────
function buildPieChart(slices,size=200){
  // slices: [{label,value,color}]
  const total=slices.reduce((s,x)=>s+x.value,0);
  if(!total)return null;
  const R=size/2, cx=R, cy=R, r=R*0.72, inner=R*0.38;
  let angle=-Math.PI/2;
  const paths=[];
  slices.forEach((sl,i)=>{
    const pct=sl.value/total;
    const sweep=pct*2*Math.PI;
    const x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
    angle+=sweep;
    const x2=cx+r*Math.cos(angle), y2=cy+r*Math.sin(angle);
    const large=sweep>Math.PI?1:0;
    // outer arc
    const ox1=cx+r*Math.cos(angle-sweep), oy1=cy+r*Math.sin(angle-sweep);
    const ox2=cx+r*Math.cos(angle),       oy2=cy+r*Math.sin(angle);
    // inner arc (donut)
    const ix1=cx+inner*Math.cos(angle),       iy1=cy+inner*Math.sin(angle);
    const ix2=cx+inner*Math.cos(angle-sweep), iy2=cy+inner*Math.sin(angle-sweep);
    const d=`M${ox1},${oy1} A${r},${r},0,${large},1,${ox2},${oy2} L${ix1},${iy1} A${inner},${inner},0,${large},0,${ix2},${iy2} Z`;
    const path=document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d",d);
    path.setAttribute("fill",sl.color);
    path.setAttribute("stroke","#0d1117");
    path.setAttribute("stroke-width","2");
    path.style.cursor="pointer";
    // hover highlight
    path.addEventListener("mouseenter",()=>path.setAttribute("opacity","0.8"));
    path.addEventListener("mouseleave",()=>path.setAttribute("opacity","1"));
    paths.push(path);
  });

  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox",`0 0 ${size} ${size}`);
  svg.setAttribute("width",`${size}`);
  svg.setAttribute("height",`${size}`);
  paths.forEach(p=>svg.appendChild(p));

  // center text
  const total_txt=document.createElementNS("http://www.w3.org/2000/svg","text");
  total_txt.setAttribute("x",cx); total_txt.setAttribute("y",cy-6);
  total_txt.setAttribute("text-anchor","middle");
  total_txt.setAttribute("fill","#e6edf3"); total_txt.setAttribute("font-size","11");
  total_txt.setAttribute("font-family","IBM Plex Sans Thai, sans-serif");
  total_txt.textContent="ซื้อสะสม";
  const total_val=document.createElementNS("http://www.w3.org/2000/svg","text");
  total_val.setAttribute("x",cx); total_val.setAttribute("y",cy+10);
  total_val.setAttribute("text-anchor","middle");
  total_val.setAttribute("fill","#2a9d8f"); total_val.setAttribute("font-size","13");
  total_val.setAttribute("font-weight","700");
  total_val.setAttribute("font-family","IBM Plex Sans Thai, sans-serif");
  total_val.textContent=`฿${fmt(total,0)}`;
  svg.appendChild(total_txt); svg.appendChild(total_val);

  return svg;
}

function buildFundsTab(){
  const sum=summary();
  const listEl=el("div",{id:"fund-list"});

  const renderList=()=>{
    listEl.innerHTML="";
    getFunds().forEach((f,idx)=>{
      const hasTx=!!sum[f.id];
      const c=fundColorIdx(f.id);
      const card=el("div",{draggable:"true",style:{background:"#161b22",border:"1px solid rgba(255,255,255,.07)",borderLeft:`3px solid ${c}`,borderRadius:"10px",marginBottom:"10px",overflow:"hidden",transition:"opacity .15s",cursor:"default"}});
      card.dataset.idx=idx;

      card.appendChild(el("div",{style:{display:"flex",alignItems:"stretch"}},
        el("div",{style:{padding:"14px 10px 14px 12px",cursor:"grab",color:"#6e7681",fontSize:"18px",lineHeight:"1",userSelect:"none",touchAction:"none",flexShrink:"0",display:"flex",alignItems:"center"}},"☰"),
        el("div",{style:{flex:"1",padding:"12px 0"}},
          el("div",{style:{display:"flex",alignItems:"center",gap:"4px",marginBottom:"4px"}},
            el("span",{style:{fontWeight:"700",fontSize:"14px"}},f.name),fundTag(f.type),
            f.pinned?el("span",{style:{fontSize:"10px",color:"#e76f51",marginLeft:"4px"}},"⚡"):null,
            el("span",{style:{fontSize:"10px",color:"#6e7681",background:"rgba(255,255,255,.05)",borderRadius:"4px",padding:"1px 5px",marginLeft:"2px"}},`#${idx+1}`)
          ),
          el("div",{style:{fontSize:"11px",color:"#8b949e"}},f.fullName),
          el("div",{style:{marginTop:"5px",display:"flex",alignItems:"center",gap:"6px"}},
            el("span",{style:{fontSize:"10px",color:"#6e7681"}},"ความเสี่ยง"),...riskBar(f.risk),el("span",{style:{fontSize:"10px",color:"#6e7681"}},`${f.risk}/8`)
          )
        ),
        el("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",justifyContent:"center",gap:"6px",padding:"12px 12px 12px 0"}},
          hasTx?el("span",{style:{fontSize:"10px",background:"rgba(42,157,143,.15)",color:"#2a9d8f",border:"1px solid rgba(42,157,143,.3)",borderRadius:"4px",padding:"1px 6px"}},"มีรายการ"):
                el("span",{style:{fontSize:"10px",color:"#6e7681"}},"ยังไม่มีรายการ"),
          el("div",{style:{display:"flex",gap:"4px"}},
            // pin toggle
            el("button",{style:{background:"none",border:"none",cursor:"pointer",fontSize:"14px",padding:"4px",opacity:f.pinned?"1":"0.4"},title:"เพิ่มด่วน",
              onClick:()=>{state.funds=state.funds.map(fd=>fd.id===f.id?{...fd,pinned:!fd.pinned}:fd);LS.set("rmf_funds",state.funds);renderList();}},
              "⚡"),
            actionBtn("✏️","#457b9d",()=>{state.fundForm={id:f.id,name:f.name,fullName:f.fullName,type:f.type,risk:f.risk};state.editFundId=f.id;state.showFundModal=true;render();}),
            hasTx?null:actionBtn("🗑","#e76f51",()=>{state.deleteFundId=f.id;render();})
          )
        )
      ));

      // Desktop drag
      card.addEventListener("dragstart",e=>{state.dragIdx=idx;card.classList.add("dragging");e.dataTransfer.effectAllowed="move";});
      card.addEventListener("dragend",()=>{card.classList.remove("dragging");state.dragIdx=null;document.querySelectorAll(".drag-over").forEach(e=>e.classList.remove("drag-over"));});
      card.addEventListener("dragover",e=>{e.preventDefault();e.dataTransfer.dropEffect="move";card.classList.add("drag-over");});
      card.addEventListener("dragleave",()=>card.classList.remove("drag-over"));
      card.addEventListener("drop",e=>{
        e.preventDefault();card.classList.remove("drag-over");
        const from=state.dragIdx,to=parseInt(card.dataset.idx);
        if(from===null||from===to)return;
        const arr=[...state.funds];const[m]=arr.splice(from,1);arr.splice(to,0,m);
        state.funds=arr;LS.set("rmf_funds",state.funds);state.dragIdx=null;renderList();
      });

      // Touch drag
      let touchFrom=null,touchClone=null;
      card.addEventListener("touchstart",e=>{
        touchFrom=idx;
        touchClone=card.cloneNode(true);
        touchClone.style.cssText+=";position:fixed;left:16px;right:16px;z-index:9999;opacity:.85;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.5);";
        touchClone.style.top=card.getBoundingClientRect().top+"px";
        touchClone.style.width=card.offsetWidth+"px";
        document.body.appendChild(touchClone);
        card.style.opacity="0.3";
      },{passive:true});
      card.addEventListener("touchmove",e=>{
        e.preventDefault();
        const dy=e.touches[0].clientY-e.touches[0].clientY;
        const rect=card.getBoundingClientRect();
        if(touchClone)touchClone.style.top=(rect.top+(e.touches[0].clientY-e.touches[0].clientY))+"px";
        // simpler: just move clone with finger
        if(touchClone)touchClone.style.top=(e.touches[0].clientY-50)+"px";
        document.querySelectorAll(".drag-over").forEach(e=>e.classList.remove("drag-over"));
        const els=document.elementsFromPoint(e.touches[0].clientX,e.touches[0].clientY);
        const target=els.find(el=>el.dataset&&el.dataset.idx!==undefined&&parseInt(el.dataset.idx)!==touchFrom);
        if(target)target.classList.add("drag-over");
      },{passive:false});
      card.addEventListener("touchend",e=>{
        card.style.opacity="";if(touchClone){touchClone.remove();touchClone=null;}
        const touch=e.changedTouches[0];
        const els=document.elementsFromPoint(touch.clientX,touch.clientY);
        const target=els.find(el=>el.dataset&&el.dataset.idx!==undefined&&parseInt(el.dataset.idx)!==touchFrom);
        document.querySelectorAll(".drag-over").forEach(e=>e.classList.remove("drag-over"));
        if(target&&touchFrom!==null){
          const to=parseInt(target.dataset.idx);
          if(!isNaN(to)&&to!==touchFrom){
            const arr=[...state.funds];const[m]=arr.splice(touchFrom,1);arr.splice(to,0,m);
            state.funds=arr;LS.set("rmf_funds",state.funds);
          }
        }
        touchFrom=null;renderList();
      },{passive:true});

      listEl.appendChild(card);
    });
  };
  renderList();

  return el("div",{style:{padding:"14px"}},
    el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}},
      el("div",null,el("div",{style:{fontSize:"14px",fontWeight:"600"}},"รายการกองทุน"),el("div",{style:{fontSize:"11px",color:"#8b949e",marginTop:"2px"}},`${getFunds().length} กองทุน`)),
      el("button",{style:{background:"rgba(42,157,143,.15)",border:"1px solid rgba(42,157,143,.3)",color:"#2a9d8f",borderRadius:"8px",padding:"8px 14px",fontSize:"13px",fontWeight:"600",cursor:"pointer"},
        onClick:()=>{state.fundForm={id:"",name:"",fullName:"",type:"หุ้น",risk:5};state.editFundId=null;state.showFundModal=true;render();}},"＋ เพิ่มกองทุน")
    ),
    el("div",{style:{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:"8px",padding:"9px 12px",marginBottom:"12px",fontSize:"11px",color:"#6e7681",display:"flex",alignItems:"center",gap:"8px"}},
      el("span",null,"☰ ลากเรียงลำดับ  ·  ⚡ = ปุ่มเพิ่มด่วน (กดเพื่อเปิด/ปิด)")
    ),
    listEl,
    el("div",{style:{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:"10px",padding:"10px 14px",marginTop:"4px",fontSize:"11px",color:"#6e7681"}},"💡 กองทุนที่มีรายการซื้อขายอยู่แล้วสามารถแก้ไขได้ แต่ไม่สามารถลบได้")
  );

  const unitEl=el("input",{type:"number",placeholder:"0.0000",value:f.units??""});
  const amtEl =el("input",{type:"number",placeholder:"0.00",  value:f.amount??""});
  [navEl,unitEl,amtEl].forEach(i=>{i.style.cssText="width:100%;background:#21262d;border:1px solid rgba(255,255,255,.1);color:#e6edf3;border-radius:8px;padding:10px 12px;font-size:14px;margin-bottom:0;box-sizing:border-box;font-family:inherit";});
  amtEl.style.color="#2a9d8f";amtEl.style.fontWeight="700";

  // recalc logic: whichever two fields are filled → compute third
  const recalc=(changed)=>{
    const u=parseFloat(unitEl.value),n=parseFloat(navEl.value),a=parseFloat(amtEl.value);
    if(changed!=="amount"&&!isNaN(u)&&!isNaN(n)){
      // units×nav→amount
      const v=+(u*n).toFixed(2);amtEl.value=v;f.units=u;f.nav=n;f.amount=v;
    } else if(changed==="amount"&&!isNaN(a)&&!isNaN(n)&&n>0){
      // amount÷nav→units
      const v=+(a/n).toFixed(4);unitEl.value=v;f.units=v;f.nav=n;f.amount=a;
    } else if(changed==="amount"&&!isNaN(a)&&!isNaN(u)&&u>0){
      // amount÷units→nav
      const v=+(a/u).toFixed(4);navEl.value=v;f.nav=v;f.units=u;f.amount=a;
    } else {
      f.units=isNaN(u)?f.units:u;
      f.nav=isNaN(n)?f.nav:n;
      f.amount=isNaN(a)?f.amount:a;
    }
  };
  navEl.addEventListener("input", ()=>recalc("nav"));
  unitEl.addEventListener("input",()=>recalc("units"));
  amtEl.addEventListener("input", ()=>recalc("amount"));

  // mode toggle: ระบุ "หน่วย+NAV" หรือ "เงิน+NAV"
  const modeHint=el("div",{style:{fontSize:"10px",color:"#6e7681",marginBottom:"12px",lineHeight:"1.5"}},
    "💡 กรอกได้ 2 ในสาม: หน่วย / NAV / จำนวนเงิน — ระบบคำนวณที่เหลือให้อัตโนมัติ"
  );

  const funds=getFunds();
  return sheetWrap(100,close,
    el("div",{style:{background:"#161b22",borderRadius:"16px 16px 0 0",border:"1px solid rgba(255,255,255,.1)",padding:"20px 20px 40px",width:"100%",maxHeight:"92vh",overflowY:"auto"},onClick:e=>e.stopPropagation()},
      el("h2",{style:{fontSize:"16px",fontWeight:"700",margin:"0 0 16px"}},isEdit?"แก้ไขรายการ":"เพิ่มรายการซื้อขาย RMF"),
      lbl("วันที่ทำรายการ"),inp("date","",f.date,v=>{f.date=v;}),
      lbl("กองทุน"),sel(f.fund,funds.map(fd=>[fd.id,`${fd.name} — ${fd.fullName}`]),v=>{f.fund=v;render();}),
      lbl("ประเภทรายการ"),sel(f.type,[["ซื้อ","ซื้อ"],["ขาย/สับเปลี่ยน","ขาย / สับเปลี่ยน"]],v=>{f.type=v;render();}),
      modeHint,
      el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"12px"}},
        el("div",null,lbl("จำนวนหน่วย"),unitEl),
        el("div",null,lbl("NAV (บาท/หน่วย)"),navEl)
      ),
      lbl("จำนวนเงิน (บาท) — ใส่แทนหน่วยได้"),
      amtEl,
      el("div",{style:{height:"12px"}}),
      lbl("หมายเหตุ (ถ้ามี)"),inp("text","เช่น ลดหย่อนภาษีปลายปี",f.note,v=>{f.note=v;}),
      solidBtn(isEdit?"บันทึกการแก้ไข":"บันทึกรายการ","#e76f51",()=>{
        const u=parseFloat(f.units||unitEl.value),n=parseFloat(f.nav||navEl.value),a=parseFloat(f.amount||amtEl.value);
        if(!f.date||isNaN(n))return alert("กรุณาใส่วันที่และ NAV");
        const units=isNaN(u)&&!isNaN(a)?+(a/n).toFixed(4):u;
        const amount=isNaN(a)?+(units*n).toFixed(2):a;
        if(!units||!amount)return alert("กรุณาใส่จำนวนหน่วย หรือจำนวนเงิน");

    )
  );
}

// ── News fetch ────────────────────────────────────────
async function fetchNews(fund){
  if(!state.apiKey){state.showKeyModal=true;render();return;}
  state.newsCache[fund.id]={loading:true,error:null,items:[]};render();
  try{
    const prompt=`ค้นหาข่าวล่าสุด (ภายใน 30 วัน) ที่เกี่ยวข้องกับกองทุน "${fund.name}" (${fund.fullName}) หรือตลาดที่กองทุนนี้ลงทุน เช่น Nasdaq, S&P500, อัตราดอกเบี้ย, เศรษฐกิจโลก ที่อาจกระทบมูลค่ากองทุน ตอบกลับเป็น JSON array เท่านั้น ไม่มี markdown: [{"title":"หัวข้อ","summary":"สรุป 1-2 ประโยค","sentiment":"positive|negative|neutral","date":"DD/MM/YYYY","url":"https://...","impact":"สูง|กลาง|ต่ำ"}] หา 3-5 ข่าว เรียงใหม่ไปเก่า หากไม่พบตอบ: []`;
    const text=await geminiSearch(prompt);
    const match=text.match(/\[[\s\S]*\]/);
    if(!match)throw new Error("parse error");
    const items=JSON.parse(match[0]);
    state.newsCache[fund.id]={loading:false,error:null,items,fetchedAt:new Date().toLocaleTimeString("th-TH")};
  }catch(e){
    if(e.message==="NO_KEY"){state.showKeyModal=true;render();return;}
    state.newsCache[fund.id]={loading:false,error:e.message||"โหลดไม่สำเร็จ",items:[]};
  }
  render();
}
function fetchAllNews(){
  const sum=summary();
  getFunds().filter(f=>sum[f.id]).forEach(f=>fetchNews(f));
}

  state.navHistory[fund.id]={loading:true,error:null,points:[]};render();
  try{
    const prompt=`ค้นหาประวัติราคา NAV รายเดือนย้อนหลัง 12 เดือนของกองทุน "${fund.name}" (${fund.fullName}) จาก sec.or.th, thaimutualfund.com หรือเว็บบลจ. ตอบกลับเป็น JSON array เท่านั้น ไม่มี markdown เรียงจากเก่าไปใหม่: [{"date":"MM/YYYY","nav":<ตัวเลข>}] ต้องการอย่างน้อย 6 จุด หากไม่พบตอบ: []`;
    const text=await geminiSearch(prompt);
    const match=text.match(/\[[\s\S]*?\]/);
    if(!match)throw new Error("parse error");
    const points=JSON.parse(match[0]);
    if(!points.length)throw new Error("ไม่พบข้อมูลประวัติ NAV");
    state.navHistory[fund.id]={loading:false,error:null,points,fetchedAt:new Date().toLocaleTimeString("th-TH")};
  }catch(e){
    if(e.message==="NO_KEY"){state.showKeyModal=true;render();return;}
    state.navHistory[fund.id]={loading:false,error:e.message||"โหลดไม่สำเร็จ",points:[]};
  }
  render();
}

// ── SVG Line Chart ────────────────────────────────────
function buildLineChart(points,color,W=320,H=160){
  if(!points||points.length<2)return null;
  const navs=points.map(p=>p.nav);
  const minV=Math.min(...navs), maxV=Math.max(...navs);
  const range=maxV-minV||1;
  const pad={t:16,r:12,b:32,l:46};
  const cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
  const px=i=>(pad.l+i*(cw/(points.length-1)));
  const py=v=>(pad.t+ch-(((v-minV)/range)*ch));

  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  svg.setAttribute("width","100%");
  svg.setAttribute("height",`${H}`);
  svg.style.overflow="visible";

  // grid lines
  [0,0.25,0.5,0.75,1].forEach(t=>{
    const y=pad.t+ch*(1-t);
    const line=document.createElementNS("http://www.w3.org/2000/svg","line");
    line.setAttribute("x1",pad.l);line.setAttribute("x2",W-pad.r);
    line.setAttribute("y1",y);line.setAttribute("y2",y);
    line.setAttribute("stroke","rgba(255,255,255,0.06)");line.setAttribute("stroke-width","1");
    svg.appendChild(line);
    const val=(minV+range*t).toFixed(2);
    const txt=document.createElementNS("http://www.w3.org/2000/svg","text");
    txt.setAttribute("x",pad.l-4);txt.setAttribute("y",y+4);
    txt.setAttribute("text-anchor","end");txt.setAttribute("fill","#6e7681");
    txt.setAttribute("font-size","9");txt.setAttribute("font-family","IBM Plex Sans, sans-serif");
    txt.textContent=val;
    svg.appendChild(txt);
  });

  // area fill
  const areaD=`M${px(0)},${py(points[0].nav)} `+points.slice(1).map((_,i)=>`L${px(i+1)},${py(points[i+1].nav)}`).join(" ")+` L${px(points.length-1)},${pad.t+ch} L${px(0)},${pad.t+ch} Z`;
  const area=document.createElementNS("http://www.w3.org/2000/svg","path");
  area.setAttribute("d",areaD);
  area.setAttribute("fill",color+"22");
  svg.appendChild(area);

  // line
  const lineD=`M${px(0)},${py(points[0].nav)} `+points.slice(1).map((_,i)=>`L${px(i+1)},${py(points[i+1].nav)}`).join(" ");
  const path=document.createElementNS("http://www.w3.org/2000/svg","path");
  path.setAttribute("d",lineD);path.setAttribute("fill","none");
  path.setAttribute("stroke",color);path.setAttribute("stroke-width","2");
  path.setAttribute("stroke-linecap","round");path.setAttribute("stroke-linejoin","round");
  svg.appendChild(path);

  // dots + x-labels (show every 2nd or 3rd)
  const step=points.length<=8?1:points.length<=12?2:3;
  points.forEach((p,i)=>{
    const dot=document.createElementNS("http://www.w3.org/2000/svg","circle");
    dot.setAttribute("cx",px(i));dot.setAttribute("cy",py(p.nav));
    dot.setAttribute("r","3");dot.setAttribute("fill",color);dot.setAttribute("stroke","#0d1117");dot.setAttribute("stroke-width","1.5");
    svg.appendChild(dot);
    if(i%step===0||i===points.length-1){
      const lbl=document.createElementNS("http://www.w3.org/2000/svg","text");
      lbl.setAttribute("x",px(i));lbl.setAttribute("y",H-6);
      lbl.setAttribute("text-anchor","middle");lbl.setAttribute("fill","#6e7681");
      lbl.setAttribute("font-size","8");lbl.setAttribute("font-family","IBM Plex Sans, sans-serif");
      lbl.textContent=p.date;
      svg.appendChild(lbl);
    }
  });

  // first/last value labels
  [[0,points[0].nav],[points.length-1,points[points.length-1].nav]].forEach(([i,v])=>{
    const t=document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x",px(i));t.setAttribute("y",py(v)-7);
    t.setAttribute("text-anchor",i===0?"start":"end");
    t.setAttribute("fill",color);t.setAttribute("font-size","10");t.setAttribute("font-weight","700");
    t.setAttribute("font-family","IBM Plex Sans, sans-serif");
    t.textContent=`฿${v.toFixed(2)}`;
    svg.appendChild(t);
  });

  return svg;
}

// ── Analyze Tab ───────────────────────────────────────
function buildAnalyzeTab(){
  const sum=summary();
  const heldFunds=getFunds().filter(f=>sum[f.id]&&sum[f.id].buy>0);
  if(!state.analyzeSelectedFund&&heldFunds.length>0) state.analyzeSelectedFund=heldFunds[0].id;

  // sub-tab switcher
  const subTabs=el("div",{style:{display:"flex",gap:"8px",marginBottom:"16px"}},
    ...([["history","📈 NAV ย้อนหลัง"],["compare","💱 เปรียบเทียบผลตอบแทน"]]).map(([t,label])=>
      el("button",{style:{flex:"1",padding:"9px 8px",fontSize:"12px",fontWeight:state.analyzeTab===t?"700":"400",
        color:state.analyzeTab===t?"#fff":"#8b949e",
        background:state.analyzeTab===t?"#e76f51":"rgba(255,255,255,.06)",
        border:`1px solid ${state.analyzeTab===t?"#e76f51":"rgba(255,255,255,.1)"}`,
        borderRadius:"8px",cursor:"pointer"},
        onClick:()=>{state.analyzeTab=t;render();}},label)
    )
  );

  // ══ NAV History section ══
  const buildHistory=()=>{
    const fundSel=el("div",{style:{display:"flex",gap:"6px",marginBottom:"14px",overflowX:"auto",paddingBottom:"2px"}},
      ...heldFunds.map(f=>{
        const active=state.analyzeSelectedFund===f.id;
        const c=fundColorIdx(f.id);
        return el("button",{style:{background:active?c+"33":"rgba(255,255,255,.04)",color:active?c:"#8b949e",
          border:`1px solid ${active?c+"88":"rgba(255,255,255,.08)"}`,borderRadius:"20px",
          padding:"5px 12px",fontSize:"12px",fontWeight:"600",cursor:"pointer",whiteSpace:"nowrap"},
          onClick:()=>{state.analyzeSelectedFund=f.id;render();}},f.name);
      })
    );

    const selFund=heldFunds.find(f=>f.id===state.analyzeSelectedFund);
    if(!selFund)return el("div",null,fundSel,el("div",{style:{textAlign:"center",color:"#8b949e",padding:"30px"}},"เลือกกองทุน"));

    const fc=fundColorIdx(selFund.id);
    const nh=state.navHistory[selFund.id];
    const s2=sum[selFund.id];

    let chartArea;
    if(!nh){
      chartArea=el("div",{style:{textAlign:"center",padding:"24px 0"}},
        el("button",{style:{background:"rgba(42,157,143,.15)",border:"1px solid rgba(42,157,143,.3)",color:"#2a9d8f",borderRadius:"8px",padding:"10px 20px",fontSize:"13px",fontWeight:"600",cursor:"pointer"},
          onClick:()=>fetchNAVHistory(selFund)},"📈 โหลดประวัติ NAV "+selFund.name)
      );
    } else if(nh.loading){
      chartArea=el("div",{style:{textAlign:"center",color:"#8b949e",padding:"30px",fontSize:"13px"}},"⏳ กำลังค้นหาข้อมูล...");
    } else if(nh.error){
      chartArea=el("div",{style:{padding:"12px 0"}},
        el("div",{style:{color:"#e76f51",fontSize:"12px",marginBottom:"8px"}},`⚠️ ${nh.error}`),
        el("button",{style:{background:"rgba(42,157,143,.15)",border:"1px solid rgba(42,157,143,.3)",color:"#2a9d8f",borderRadius:"6px",padding:"5px 12px",fontSize:"12px",fontWeight:"600",cursor:"pointer"},
          onClick:()=>fetchNAVHistory(selFund)},"ลองใหม่")
      );
    } else {
      const pts=nh.points;
      const navs=pts.map(p=>p.nav);
      const first=navs[0], last=navs[navs.length-1];
      const chg=last-first, chgPct=((chg/first)*100);
      const pos=chg>=0;
      const chart=buildLineChart(pts,fc);

      // stats row
      const statRow=el("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"1px",background:"rgba(255,255,255,.04)",borderRadius:"8px",overflow:"hidden",marginBottom:"12px"}},
        ...[
          ["NAV ต่ำสุด",`฿${Math.min(...navs).toFixed(4)}`,"#e6edf3"],
          ["NAV สูงสุด",`฿${Math.max(...navs).toFixed(4)}`,"#e6edf3"],
          ["เปลี่ยนแปลง",`${pos?"+":""}${chgPct.toFixed(2)}%`,pos?"#2a9d8f":"#e76f51"],
        ].map(([l,v,c])=>el("div",{style:{padding:"10px 8px",textAlign:"center",background:"#161b22"}},
          el("div",{style:{fontSize:"10px",color:"#8b949e",marginBottom:"2px"}},l),
          el("div",{style:{fontSize:"13px",fontWeight:"700",color:c,fontVariantNumeric:"tabular-nums"}},v)
        ))
      );

      // avg buy vs current nav
      const avgBuy=s2.buy/s2.units;
      const gainPerUnit=last-avgBuy;
      const gainPct=((gainPerUnit/avgBuy)*100);

      chartArea=el("div",null,
        statRow,
        el("div",{style:{background:"#161b22",border:"1px solid rgba(255,255,255,.07)",borderRadius:"10px",padding:"14px",marginBottom:"10px",overflowX:"auto"}},
          chart||el("div",{style:{color:"#8b949e",textAlign:"center",padding:"20px"}},"ไม่มีข้อมูลเพียงพอ")
        ),
        el("div",{style:{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:"8px",padding:"10px 14px",fontSize:"11px"}},
          el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}},
            el("div",null,el("div",{style:{color:"#8b949e",fontSize:"10px",marginBottom:"2px"}},"ราคาซื้อเฉลี่ย/หน่วย"),el("div",{style:{fontWeight:"700"}},`฿${avgBuy.toFixed(4)}`)),
            el("div",null,el("div",{style:{color:"#8b949e",fontSize:"10px",marginBottom:"2px"}},"NAV ปัจจุบัน"),el("div",{style:{fontWeight:"700",color:fc}},`฿${last.toFixed(4)}`)),
            el("div",null,el("div",{style:{color:"#8b949e",fontSize:"10px",marginBottom:"2px"}},"กำไร/ขาดทุน/หน่วย"),el("div",{style:{fontWeight:"700",color:gainPerUnit>=0?"#2a9d8f":"#e76f51"}},`${gainPerUnit>=0?"+":""}฿${gainPerUnit.toFixed(4)}`)),
            el("div",null,el("div",{style:{color:"#8b949e",fontSize:"10px",marginBottom:"2px"}},"ผลตอบแทน %"),el("div",{style:{fontWeight:"700",color:gainPct>=0?"#2a9d8f":"#e76f51"}},`${gainPct>=0?"+":""}${gainPct.toFixed(2)}%`))
          )
        ),
        el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"8px"}},
          el("span",{style:{fontSize:"10px",color:"#6e7681"}},`อัปเดต ${nh.fetchedAt||""}`),
          el("button",{style:{background:"none",border:"1px solid rgba(255,255,255,.1)",color:"#8b949e",borderRadius:"6px",padding:"3px 10px",fontSize:"11px",cursor:"pointer"},
            onClick:()=>fetchNAVHistory(selFund)},"↻ รีเฟรช")
        )
      );
    }

    return el("div",null,fundSel,
      el("div",{style:{background:"#161b22",border:`1px solid rgba(255,255,255,.07)`,borderLeft:`3px solid ${fc}`,borderRadius:"10px",padding:"14px"}},
        el("div",{style:{display:"flex",alignItems:"center",gap:"6px",marginBottom:"12px"}},
          el("span",{style:{fontWeight:"700",fontSize:"14px"}},selFund.name),fundTag(selFund.type),
          el("span",{style:{fontSize:"10px",color:"#6e7681",marginLeft:"4px"}},selFund.fullName)
        ),
        chartArea
      )
    );
  };

  // ══ Compare Returns section ══
  const buildCompare=()=>{
    const rows=heldFunds.map((f,idx)=>{
      const s2=sum[f.id];
      const fc=fundColorIdx(f.id);
      const nh=state.navHistory[f.id];
      const hasNav=nh&&!nh.loading&&!nh.error&&nh.points&&nh.points.length>0;
      const currentNav=hasNav?nh.points[nh.points.length-1].nav:null;
      const avgBuy=s2.buy/s2.units;
      const unrealized=currentNav?(currentNav*s2.units)-s2.buy:null;
      const retPct=currentNav?((currentNav-avgBuy)/avgBuy*100):null;
      const costPct=s2.buy/(totalBuy()||1)*100;

      return el("div",{style:{background:"#161b22",border:"1px solid rgba(255,255,255,.07)",borderLeft:`3px solid ${fc}`,borderRadius:"10px",marginBottom:"10px",padding:"12px 14px"}},
        // header row
        el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"10px"}},
          el("div",null,
            el("div",{style:{display:"flex",alignItems:"center",gap:"6px"}},
              el("span",{style:{fontWeight:"700",fontSize:"13px"}},f.name),fundTag(f.type)
            ),
            el("div",{style:{fontSize:"10px",color:"#6e7681",marginTop:"2px"}},`${s2.txCount} รายการ · สัดส่วน ${costPct.toFixed(1)}%`)
          ),
          retPct!==null?el("div",{style:{textAlign:"right"}},
            el("div",{style:{fontSize:"18px",fontWeight:"700",color:retPct>=0?"#2a9d8f":"#e76f51",letterSpacing:"-0.5px"}},`${retPct>=0?"+":""}${retPct.toFixed(2)}%`),
            el("div",{style:{fontSize:"10px",color:"#8b949e"}},"ผลตอบแทน")
          ):el("button",{style:{background:"rgba(42,157,143,.12)",border:"1px solid rgba(42,157,143,.25)",color:"#2a9d8f",borderRadius:"6px",padding:"4px 8px",fontSize:"10px",fontWeight:"600",cursor:"pointer"},
            onClick:()=>{state.analyzeSelectedFund=f.id;fetchNAVHistory(f);}},"โหลด NAV")
        ),
        // metrics grid
        el("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"6px",fontSize:"10px"}},
          ...[
            ["ต้นทุนสะสม",`฿${fmt(s2.buy,0)}`,"#e6edf3"],
            ["หน่วยถือครอง",fmt(s2.units,4),"#e6edf3"],
            ["มูลค่าปัจจุบัน",currentNav?`฿${fmt(currentNav*s2.units,0)}`:"-","#e6edf3"],
            ["กำไร/ขาดทุน",unrealized!==null?`${unrealized>=0?"+":""}฿${fmt(unrealized,0)}`:"-",unrealized!==null?(unrealized>=0?"#2a9d8f":"#e76f51"):"#6e7681"],
          ].map(([l,v,c])=>el("div",{style:{background:"rgba(255,255,255,.04)",borderRadius:"6px",padding:"7px 6px",textAlign:"center"}},
            el("div",{style:{color:"#6e7681",marginBottom:"2px"}},l),
            el("div",{style:{fontWeight:"700",color:c,fontVariantNumeric:"tabular-nums",wordBreak:"break-all"}},v)
          ))
        ),
        // return bar
        retPct!==null?el("div",{style:{marginTop:"8px"}},
          el("div",{style:{height:"4px",background:"rgba(255,255,255,.07)",borderRadius:"2px",overflow:"hidden"}},
            el("div",{style:{height:"100%",width:Math.min(Math.abs(retPct)/20*100,100)+"%",
              background:retPct>=0?`linear-gradient(90deg,#2a9d8f,#2a9d8f88)`:`linear-gradient(90deg,#e76f51,#e76f5188)`,borderRadius:"2px"}})
          )
        ):null
      );
    });

    // overall stats
    const fundsWithNav=heldFunds.filter(f=>{const nh=state.navHistory[f.id];return nh&&!nh.loading&&!nh.error&&nh.points?.length>0;});
    const totalUnrealized=fundsWithNav.reduce((acc,f)=>{
      const nh=state.navHistory[f.id],s2=sum[f.id];
      const last=nh.points[nh.points.length-1].nav;
      return acc+(last*s2.units-s2.buy);
    },0);
    const tb=totalBuy();

    const overallBox=fundsWithNav.length>0?el("div",{style:{background:"linear-gradient(135deg,rgba(42,157,143,.1),rgba(42,157,143,.05))",border:"1px solid rgba(42,157,143,.25)",borderRadius:"10px",padding:"14px",marginBottom:"14px"}},
      el("div",{style:{fontSize:"11px",color:"#2a9d8f",fontWeight:"700",letterSpacing:"1px",marginBottom:"10px"}},"📊 ภาพรวมพอร์ต (จากกองทุนที่มี NAV)"),
      el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px"}},
        el("div",null,el("div",{style:{color:"#8b949e",fontSize:"10px",marginBottom:"2px"}},"ต้นทุนรวม"),el("div",{style:{fontWeight:"700",fontSize:"15px"}},`฿${fmt(tb,0)}`)),
        el("div",null,el("div",{style:{color:"#8b949e",fontSize:"10px",marginBottom:"2px"}},"กำไร/ขาดทุนรวม"),el("div",{style:{fontWeight:"700",fontSize:"15px",color:totalUnrealized>=0?"#2a9d8f":"#e76f51"}},`${totalUnrealized>=0?"+":""}฿${fmt(totalUnrealized,0)}`)),
        el("div",null,el("div",{style:{color:"#8b949e",fontSize:"10px",marginBottom:"2px"}},"ผลตอบแทนรวม"),el("div",{style:{fontWeight:"700",fontSize:"15px",color:totalUnrealized>=0?"#2a9d8f":"#e76f51"}},`${totalUnrealized>=0?"+":""}${((totalUnrealized/tb)*100).toFixed(2)}%`))
      )
    ):null;

    const needNav=heldFunds.filter(f=>!state.navHistory[f.id]||state.navHistory[f.id].error);
    const loadAllBtn=needNav.length>0?el("div",{style:{marginBottom:"12px"}},
      el("button",{style:{width:"100%",background:"rgba(42,157,143,.15)",border:"1px solid rgba(42,157,143,.3)",color:"#2a9d8f",borderRadius:"8px",padding:"10px",fontSize:"13px",fontWeight:"600",cursor:"pointer"},
        onClick:()=>heldFunds.forEach(f=>fetchNAVHistory(f))},`⚡ โหลด NAV ทั้ง ${heldFunds.length} กองทุน`)
    ):null;

    return el("div",null,overallBox,loadAllBtn,...rows,
      el("div",{style:{fontSize:"10px",color:"#6e7681",textAlign:"center",marginTop:"8px"}},"* ผลตอบแทนคำนวณจาก NAV ปัจจุบัน vs ราคาซื้อเฉลี่ย · ไม่รวมค่าธรรมเนียม")
    );
  };

  return el("div",{style:{padding:"14px"}},
    el("div",{style:{fontSize:"14px",fontWeight:"600",marginBottom:"14px"}},"📈 วิเคราะห์การลงทุน"),
    subTabs,
    state.analyzeTab==="history"?buildHistory():buildCompare()
  );
}

// ── Main render ───────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  const content=state.tab==="tx"?buildTxTab():state.tab==="nav"?buildNavTab():state.tab==="summary"?buildSummaryTab():state.tab==="news"?buildNewsTab():state.tab==="analyze"?buildAnalyzeTab():buildFundsTab();
  app.appendChild(el("div",{style:{minHeight:"100vh",background:"#0d1117",paddingBottom:"60px"}},
    buildHeader(),buildTabs(),content,
    buildTxModal(),buildFundModal(),
    buildDeleteTxModal(),buildDeleteFundModal(),
    buildKeyModal()
  ));
}

if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js"));}
render();
</script>
